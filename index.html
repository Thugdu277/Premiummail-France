    <!-- Vous pouvez insérer vos styles CSS ici si vous en avez -->
    <style>
        /* Vos styles CSS existants peuvent être placés ici */

    <!-- L'interface de votre application (écrans de connexion et de l'app) doit être ici -->
    <div id="loginScreen">
        <input type="text" id="loginUser" placeholder="Utilisateur">
        <input type="password" id="loginPass" placeholder="Mot de passe">
        <button onclick="doLogin()">Connexion</button>
        <p id="loginError" style="display:none; color:red;">Identifiants incorrects</p>
    </div>

    <div id="appScreen" style="display:none;">
        <!-- Vos sélecteurs, boutons, barres de progression et tableaux vont ici -->
        <select id="pays" onchange="updateVilles()">
            <option value="fr">France</option>
            <option value="be">Belgique</option>
            <option value="ch">Suisse</option>
        </select>
        <select id="ville"></select>
        <select id="secteur">
            <option value="all">Général</option>
        </select>
        <select id="targetCount" onchange="toggleCustom()">
            <option value="100">100</option>
            <option value="custom">Personnalisé</option>
        </select>
        <div id="customField" style="display:none;">
            <input type="number" id="customCount" value="500">
        </div>
        
        <button onclick="startScan()">Démarrer</button>
        <button onclick="stopScan()">Arrêter</button>
        <button onclick="clearAll()">Vider</button>
        
        <div id="scanDot"></div>
        <div id="scanLabel">En attente</div>
        <div id="scanTarget">—</div>
        <div id="progressBar" style="width:0%; height:10px; background:blue;"></div>
        
        <div>Total: <span id="statTotal">0</span> | Uniques: <span id="statUniq">0</span> | Débit: <span id="statRate">0</span>/m</div>
        <div id="resultsCount">0 email(s)</div>
        
        <table>
            <tbody id="tbody"></tbody>
        </table>
    </div>

        document.getElementById('loginScreen').style.display = 'none';

        err.style.display = 'none';
      } else {
        err.style.display = 'block';
        document.getElementById('loginPass').value = '';
      }

      finance:   ["finance","invest","courtage","assurance","fidu","capital"],
      tech:      ["tech","soft","digital","cloud","app","data","net","cyber"],
      industrie: ["indus","fab","manufactur","metal","prod","atelier"],
      transport: ["logistik","trans","fret","delivery","fret","express"],
      commerce:  ["retail","shop","negoce","import","export","grossiste"],
      juridique: ["avocat","notaire","juridix","lex","barreau","conseils"],
      education: ["edu","ecole","academy","formation","learn","e-stud"]
    };

    const B2B_SUFFIXES = ["groupe","solutions","services","expert","holding","international","plus","pro","systemes","partners"];

    // STATE
    let allEmails = [];
    let generated = new Set();
    let scanInterval = null;
    let scanCount = 0;
    let scanTarget = 0;
    let rateCountMin = 0;
    let rateInterval = null;

    // UTILS
    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function now() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    function toggleCustom() {
      document.getElementById('customField').style.display =
        document.getElementById('targetCount').value === 'custom' ? 'block' : 'none';
    }

    function updateVilles() {
      const pays = document.getElementById('pays').value;
      const villes = VILLES[pays] || ["Toutes villes"];
      const sel = document.getElementById('ville');
      sel.innerHTML = '';
      villes.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v === 'Toutes villes' ? 'all' : v;
        opt.textContent = v;
        sel.appendChild(opt);
      });
    }

    // COOLDOWN STABLE DE 300 MAILS
    const COOLDOWN = 300;

    const cooldownPrenom = [];
    const cooldownNom    = [];
    const cooldownSuffix = [];
    const cooldownEntreprise = [];

    function slugify(str) {
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/gi,'').toLowerCase();
    }

    function sep() { return rand(['.','-','_','']); }

    function pickWithCooldown(pool, cooldownQueue) {
      const available = pool.filter(item => !cooldownQueue.includes(item));
      const chosen = available.length > 0 ? rand(available) : cooldownQueue[0];
      
      cooldownQueue.push(chosen);
      if (cooldownQueue.length > COOLDOWN) cooldownQueue.shift();
      return chosen;
    }

    const SUFFIX_CATEGORIES = [
      { key: 'none',   weight: 35, gen: () => '' },
      { key: '2digit', weight: 20, gen: () => String(randInt(10, 99)) },
      { key: '3digit', weight: 15, gen: () => String(randInt(100, 999)) },
      { key: 'year',   weight: 15, gen: () => String(randInt(1970, 2008)) },
      { key: 'word',   weight: 15, gen: () => rand(['pro','perso','contact','work','mail','office','direct']) }
    ];

    function buildSuffix() {
      const available = SUFFIX_CATEGORIES.filter(c => !cooldownSuffix.includes(c.key));
      const pool = available.length > 0 ? available : SUFFIX_CATEGORIES;
      
      const totalWeight = pool.reduce((s, c) => s + c.weight, 0);
      let r = Math.random() * totalWeight;
      let chosen = pool[pool.length - 1];
      for (const cat of pool) { r -= cat.weight; if (r <= 0) { chosen = cat; break; } }
      
      cooldownSuffix.push(chosen.key);
      if (cooldownSuffix.length > 15) cooldownSuffix.shift(); 
      return chosen.gen();
    }

    function buildLocal(p, n) {
      const ps = slugify(p);
      const ns = slugify(n);
      const pi = ps[0];
      const ni = ns[0];

      const formats = [
        () => `${ps}.${ns}`,
        () => `${ps}${ns}`,
        () => `${pi}.${ns}`,
        () => `${pi}${ns}`,
        () => `${ns}.${ps}`,
        () => `${ns}${ps}`,
        () => `${ps}_${ns}`,
        () => `${ns}_${ps}`,
        () => `${ps}-${ns}`,
        () => `${ps}.${ni}`,
        () => `${ps}${sep()}${ns}`,
        () => `${pi}${sep()}${ns}`,
      ];

      return rand(formats)();
    }

    function generateUniqueCompany(secteur, ville, extPays) {
      const prefixes = B2B_PREFIXES[secteur] || B2B_PREFIXES.all;
      const suffix = rand(B2B_SUFFIXES);
      
      let companyName = "";
      let attempt = 0;
      
      while (attempt < 50) {
        const pref = rand(prefixes);
        const useVille = (ville && ville !== 'all' && Math.random() < 0.40);
        const geo = useVille ? '-' + slugify(ville) : '';
        
        companyName = `${pref}-${suffix}${geo}`;
        if (!cooldownEntreprise.includes(companyName)) {
          break;
        }
        attempt++;
      }
      
      cooldownEntreprise.push(companyName);
      if (cooldownEntreprise.length > COOLDOWN) cooldownEntreprise.shift();
      
      return `${companyName}${extPays}`;
    }

    function resetCooldowns() {
      cooldownPrenom.length = 0;
      cooldownNom.length = 0;
      cooldownSuffix.length = 0;
      cooldownEntreprise.length = 0;
    }

    function buildEmail(pays, secteur, ville) {
      const prenomsList = PRENOMS[pays] || PRENOMS.fr;
      const nomsList    = NOMS[pays]    || NOMS.fr;
      const locaux      = DOMAINES_LOCAUX[pays] || [];
      const extPays     = EXT_PAYS[pays] || '.fr';

      const p = pickWithCooldown(prenomsList, cooldownPrenom);
      const n = pickWithCooldown(nomsList,    cooldownNom);
      let local = buildLocal(p, n) + buildSuffix();

      local = local.replace(/[._-]{2,}/g, '.').replace(/[._-]$/,'').toLowerCase();
      if (!local) local = slugify(p) + slugify(n);

      if (Math.random() < 0.35) {
        const targetSecteur = secteur === 'all' ? rand(Object.keys(B2B_PREFIXES)) : secteur;
        const companyDomain = generateUniqueCompany(targetSecteur, ville, extPays);
        return `${rand(['contact','info','direction','commercial',local])}@${companyDomain}`;
      }

      const useLocal = locaux.length > 0 && Math.random() < 0.54;
      if (useLocal) {
        return `${local}@${rand(locaux)}${extPays}`;
      } else {
        const g = rand(DOMAINES_GLOBAUX);
        return `${local}@${g.d}${g.ext}`;
      }
    }

    // CADENCE 1000 MAILS / 30 MIN (1.8s)
    function startScan() {
      if (scanInterval) return;

      const pays    = document.getElementById('pays').value;
      const secteur = document.getElementById('secteur').value;
      const ville   = document.getElementById('ville').value;
      const sel     = document.getElementById('targetCount').value;
      scanTarget    = sel === 'custom' ? (parseInt(document.getElementById('customCount').value) || 500) : parseInt(sel);

      scanCount = 0;
      resetCooldowns();

      const dot   = document.getElementById('scanDot');
      const label = document.getElementById('scanLabel');
      const tgt   = document.getElementById('scanTarget');
      const bar   = document.getElementById('progressBar');

      dot.classList.add('active');
      label.textContent = 'Scan en cours...';
      const paysName = document.getElementById('pays').options[document.getElementById('pays').selectedIndex].text;
      const secteurName = document.getElementById('secteur').options[document.getElementById('secteur').selectedIndex].text;
      tgt.textContent = `${secteurName} · ${paysName} · cible : ${scanTarget.toLocaleString('fr')}`;
      bar.classList.add('animated');
      bar.style.width = '0%';

      rateInterval = setInterval(() => {
        document.getElementById('statRate').textContent = (rateCountMin * 6).toLocaleString('fr'); 
        rateCountMin = 0;
      }, 10000);

      const tbody = document.getElementById('tbody');

      scanInterval = setInterval(() => {
        if (scanCount >= scanTarget) { stopScan(); return; }

        let email = null;
        let tries = 0;
        while (!email && tries < 40) {
          tries++;
          const candidate = buildEmail(pays, secteur, ville);
          if (!generated.has(candidate)) { email = candidate; }
        }
        if (!email) return;

        generated.add(email);
        allEmails.push({ email, secteur, pays, ville: ville === 'all' ? '—' : ville, time: now() });
        scanCount++;
        rateCountMin++;

        const sData = SECTEURS_DATA[secteur] || SECTEURS_DATA.all;
        const paysFlag = document.getElementById('pays').options[document.getElementById('pays').selectedIndex].text.split(' ')[0];

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--gray-400);font-size:0.7rem;font-family:'JetBrains Mono',monospace">${allEmails.length}</td>
          <td class="td-email">${email}</td>
          <td><span class="badge-secteur" style="color:${sData.color};background:${sData.bg}">${sData.label}</span></td>
          <td class="td-pays">${paysFlag}</td>
          <td class="td-ville">${ville === 'all' ? '—' : ville}</td>
          <td class="td-time">${now()}</td>
        `;
        tbody.insertBefore(tr, tbody.firstChild);

        while (tbody.children.length > 300) tbody.removeChild(tbody.lastChild);

        document.getElementById('statTotal').textContent = allEmails.length.toLocaleString('fr');
        document.getElementById('statUniq').textContent  = generated.size.toLocaleString('fr');
        document.getElementById('resultsCount').textContent = `${allEmails.length.toLocaleString('fr')} email(s)`;

        const pct = Math.min(100, Math.round((scanCount / scanTarget) * 100));
        bar.classList.remove('animated');
        bar.style.width = pct + '%';

      }, 1800);
    }

    function stopScan() {
      clearInterval(scanInterval);
      clearInterval(rateInterval);
      scanInterval = null;
      rateInterval = null;
      rateCountMin = 0;

      document.getElementById('scanDot').classList.remove('active');
      document.getElementById('scanLabel').textContent = scanCount >= scanTarget ? 'Scan terminé' : 'Arrêté';
      document.getElementById('progressBar').classList.remove('animated');
      if (scanCount >= scanTarget) document.getElementById('progressBar').style.width = '100%';
    }

    function clearAll() {
      stopScan();
      resetCooldowns();
      allEmails = [];
      generated = new Set();
      scanCount = 0;
      document.getElementById('tbody').innerHTML = '';
      ['statTotal','statUniq','statRate'].forEach(id => document.getElementById(id).textContent = '0');
      document.getElementById('resultsCount').textContent = '0 email(s)';
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('scanLabel').textContent = 'En attente';
      document.getElementById('scanTarget').textContent = '—';
    }
    </script>
</body>
</html>
